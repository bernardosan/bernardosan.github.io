<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bernardo Souza Power Platform favicon">
  <defs>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="232"/>
    </clipPath>
    <linearGradient id="platform" x1="24" y1="24" x2="244" y2="244" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#123BCE"/>
      <stop offset="0.55" stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="automate" x1="268" y1="24" x2="488" y2="244" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0078D4"/>
      <stop offset="0.55" stop-color="#2F80ED"/>
      <stop offset="1" stop-color="#74C0FC"/>
    </linearGradient>
    <linearGradient id="apps" x1="24" y1="268" x2="244" y2="488" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#742774"/>
      <stop offset="0.55" stop-color="#C239B3"/>
      <stop offset="1" stop-color="#E879F9"/>
    </linearGradient>
    <linearGradient id="bi" x1="268" y1="268" x2="488" y2="488" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="0.45" stop-color="#F2C811"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <filter id="softShadow" x="-12%" y="-12%" width="124%" height="124%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>
  </defs>
  <circle cx="256" cy="256" r="232" fill="#FFFFFF" filter="url(#softShadow)"/>
  <g clip-path="url(#circleClip)">
    <rect x="0" y="0" width="244" height="244" fill="url(#platform)"/>
    <rect x="268" y="0" width="244" height="244" fill="url(#automate)"/>
    <rect x="0" y="268" width="244" height="244" fill="url(#apps)"/>
    <rect x="268" y="268" width="244" height="244" fill="url(#bi)"/>
  </g>
  <circle cx="256" cy="256" r="232" stroke="#FFFFFF" stroke-width="18"/>
  <circle cx="256" cy="256" r="232" stroke="#0F172A" stroke-opacity="0.08" stroke-width="3"/>
</svg>
